# docker-compose.prod.yml — Production (VPS, bare IP)
# Telegram auth is ENABLED (DEV_MODE=false). JWT_SECRET must be set in .env.
# MongoDB port is NOT exposed to the host.
#
# Usage (on VPS):
#   cp .env.example .env && vim .env  # fill in JWT_SECRET, TELEGRAM_BOT_TOKEN, VITE_TELEGRAM_BOT_NAME
#   docker compose -f docker-compose.prod.yml up --build -d
#
# First-run: exercise seed data is inserted automatically on backend startup.

services:

  mongodb:
    image: mongo:8.0
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    networks:
      - gymcoach
    # Port NOT exposed — MongoDB is only reachable from within the Docker network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      MONGODB_URL: mongodb://mongodb:27017
      MONGODB_DB_NAME: gymcoach
      DEV_MODE: "false"
      JWT_SECRET: ${JWT_SECRET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    networks:
      - gymcoach
    depends_on:
      mongodb:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        VITE_TELEGRAM_BOT_NAME: ${VITE_TELEGRAM_BOT_NAME}
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - gymcoach
    depends_on:
      - backend

networks:
  gymcoach:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
