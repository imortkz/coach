# docker-compose.prod.yml — Production (VPS, registered domain, HTTPS)
# Telegram auth is ENABLED (DEV_MODE=false). JWT_SECRET, TELEGRAM_BOT_TOKEN, DOMAIN must be set in .env.
# MongoDB port is NOT exposed to the host.
#
# Usage (on VPS):
#   cp .env.example .env && vim .env  # fill in JWT_SECRET, TELEGRAM_BOT_TOKEN, VITE_TELEGRAM_BOT_NAME, DOMAIN, ACME_EMAIL
#   docker compose -f docker-compose.prod.yml up --build -d
#
# First-run: nginx starts in HTTP-only bootstrap mode (no cert yet), backend seeds exercises.
# Then issue a Let's Encrypt cert via the certbot service — see DEPLOYMENT.md "SSL setup".

services:

  mongodb:
    image: mongo:8.0
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    networks:
      - gymcoach
    # Port NOT exposed — MongoDB is only reachable from within the Docker network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      MONGODB_URL: mongodb://mongodb:27017
      MONGODB_DB_NAME: gymcoach
      DEV_MODE: "false"
      JWT_SECRET: ${JWT_SECRET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      # Optional automated-agent access (read+write as the configured user).
      # Leave empty to disable. See .env.example.
      AGENT_API_TOKEN: ${AGENT_API_TOKEN:-}
      AGENT_USER_TELEGRAM_ID: ${AGENT_USER_TELEGRAM_ID:-0}
    networks:
      - gymcoach
    depends_on:
      mongodb:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        VITE_TELEGRAM_BOT_NAME: ${VITE_TELEGRAM_BOT_NAME}
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # certbot writes ACME challenge files here; nginx reads them.
      - certbot_www:/var/www/certbot
      # Let's Encrypt cert files are read by nginx (read-only).
      - letsencrypt:/etc/letsencrypt:ro
    networks:
      - gymcoach
    depends_on:
      - backend

  # Backup sidecar — hourly mongodump archives written to /var/backups/gymcoach
  # on the host, with daily promotion at midnight UTC and configurable retention.
  # Connects to MongoDB on the internal Docker network only (no host ports).
  # On-demand restore is run manually via backup/restore-full.sh and
  # backup/restore-user.sh — see DEPLOYMENT.md "Backup & Restore".
  backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      MONGODB_URL: mongodb://mongodb:27017
      MONGODB_DB_NAME: gymcoach
      BACKUP_HOURLY_KEEP: ${BACKUP_HOURLY_KEEP:-48}
      BACKUP_DAILY_KEEP: ${BACKUP_DAILY_KEEP:-30}
    volumes:
      # Host bind-mount: archives live on the VPS filesystem so an off-site
      # copy job (rclone, etc.) can pick them up without touching containers.
      - /var/backups/gymcoach:/backups
    networks:
      - gymcoach
    depends_on:
      mongodb:
        condition: service_healthy

  # Certbot — issues and renews Let's Encrypt certs.
  # First-issue and renewals are run via `docker compose run --rm certbot ...`
  # (manual command flow in DEPLOYMENT.md). The container itself stays up only
  # to host the renewal cron.
  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Default entrypoint is overridden so the container stays up running a renewal loop.
    # Renews every 12 hours (certbot itself only renews near expiry); on success,
    # touches a marker file that nginx watches to reload itself.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        trap 'exit 0' TERM
        while :; do
          certbot renew \
            --webroot -w /var/www/certbot \
            --deploy-hook 'touch /var/www/certbot/.cert-renewed' \
            --quiet || true
          sleep 12h &
          wait $${!}
        done

networks:
  gymcoach:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  letsencrypt:
    driver: local
  certbot_www:
    driver: local
