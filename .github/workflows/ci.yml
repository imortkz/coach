name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Minimal token scope. `pull-requests: read` is needed by dorny/paths-filter
# on `pull_request` events to query the API for changed files; on `push`
# events it falls back to git diff and doesn't need that scope, but the
# permission is harmless when unused.
permissions:
  contents: read
  pull-requests: read

jobs:
  # Detect which areas of the repo changed so that area-specific jobs can
  # skip when irrelevant. The aggregate `all-checks-passed` job below
  # handles branch protection so that "skipped" still counts as passing.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'

  backend:
    name: Backend (pytest)
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:8.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand(\"ping\").ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 20s

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Pin Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run pytest
        run: uv run pytest

  frontend:
    name: Frontend (type-check + build)
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

  # Single aggregate check used as the required status check in branch
  # protection. Passes when every gated job either succeeded OR was
  # correctly skipped via the path filter; fails if any required job
  # failed, was cancelled, or did not produce a result. `if: always()`
  # is critical: without it the aggregate is itself skipped on any
  # upstream failure and the required check never resolves.
  all-checks-passed:
    name: All checks passed
    needs: [changes, backend, frontend]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify required job results
        run: |
          set -euo pipefail
          changes_result="${{ needs.changes.result }}"
          backend_result="${{ needs.backend.result }}"
          frontend_result="${{ needs.frontend.result }}"
          echo "changes:  $changes_result"
          echo "backend:  $backend_result"
          echo "frontend: $frontend_result"
          if [ "$changes_result" != "success" ]; then
            echo "::error::changes job did not succeed (got: $changes_result)"
            exit 1
          fi
          for r in "$backend_result" "$frontend_result"; do
            case "$r" in
              success|skipped) ;;
              *) echo "::error::a required job did not pass (result: $r)"; exit 1 ;;
            esac
          done
          echo "All required jobs passed or were correctly skipped."
